<svg viewBox="48 120 1184 1409" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <style>
      .ttl{font-family:Georgia,'Times New Roman',serif;font-weight:400;fill:#0a0a0a;}
      .lbl{font-family:'SF Mono',Menlo,ui-monospace,monospace;letter-spacing:0.16em;fill:#a1a1a1;}
      .sub{font-family:'SF Mono',Menlo,ui-monospace,monospace;letter-spacing:0.14em;fill:#6b6b6b;}
      .bd{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;fill:#6b6b6b;}
      .num{font-family:'SF Mono',Menlo,ui-monospace,monospace;letter-spacing:0.08em;fill:#ff4500;}
    </style>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#bdbdb8" stroke-width="1.1"/>
    </marker>
    <marker id="arwA" markerWidth="10" markerHeight="10" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L6.5,3 L0,6" fill="none" stroke="#ff4500" stroke-width="1.4"/>
    </marker>
  </defs>

  <!-- ════════ LAYER 01 ════════ -->
  <rect x="48" y="140" width="1184" height="270" rx="20" fill="#ffffff" stroke="#e4e4df"/>
  <rect x="80" y="170" width="28" height="3" fill="#ff4500"/>
  <text x="80" y="200" class="lbl" font-size="11">LAYER 01</text>
  <text x="80" y="238" class="ttl" font-size="25">Omni-channel</text>
  <text x="80" y="267" class="ttl" font-size="25">integration</text>
  <text x="80" y="292" class="sub" font-size="10.5">BUSINESS LAYER</text>
  <text x="80" y="324" class="bd" font-size="12.5">Unified gateway for global IM</text>
  <text x="80" y="342" class="bd" font-size="12.5">platforms — abstracts each channel</text>
  <text x="80" y="360" class="bd" font-size="12.5">into one standard schema.</text>

  <text x="360" y="196" class="lbl" font-size="10.5">UNIFIED GATEWAY · GLOBAL IM PLATFORMS</text>
  <!-- channel chips -->
  <rect x="360" y="212" width="195" height="58" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
  <text x="457" y="247" text-anchor="middle" class="ttl" font-size="17">WhatsApp</text>
  <rect x="575" y="212" width="195" height="58" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
  <text x="672" y="247" text-anchor="middle" class="ttl" font-size="17">Line</text>
  <rect x="790" y="212" width="195" height="58" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
  <text x="887" y="247" text-anchor="middle" class="ttl" font-size="17">Zalo</text>
  <rect x="1005" y="212" width="195" height="58" rx="10" fill="#fafaf7" stroke="#e4e4df" stroke-dasharray="3 3"/>
  <text x="1102" y="244" text-anchor="middle" class="sub" font-size="10.5">FUTURE</text>
  <text x="1102" y="259" text-anchor="middle" class="sub" font-size="10.5">CHANNELS</text>
  <!-- chip → strip arrows -->
  <line x1="457" y1="270" x2="457" y2="300" stroke="#bdbdb8" marker-end="url(#arw)"/>
  <line x1="672" y1="270" x2="672" y2="300" stroke="#bdbdb8" marker-end="url(#arw)"/>
  <line x1="887" y1="270" x2="887" y2="300" stroke="#bdbdb8" marker-end="url(#arw)"/>
  <!-- standardized schema strip -->
  <rect x="360" y="304" width="840" height="48" rx="10" fill="#0a0a0a"/>
  <text x="780" y="333" text-anchor="middle" class="sub" font-size="12" style="fill:#fafaf7" letter-spacing="0.18em">STANDARDIZED DATA SCHEMA &amp; UNIFIED API</text>

  <!-- inter-layer connector -->
  <line x1="640" y1="410" x2="640" y2="436" stroke="#ff4500" stroke-width="1.5" marker-end="url(#arwA)"/>

  <!-- ════════ LAYER 02 ════════ -->
  <rect x="48" y="440" width="1184" height="415" rx="20" fill="#ffffff" stroke="#e4e4df"/>
  <rect x="80" y="470" width="28" height="3" fill="#ff4500"/>
  <text x="80" y="500" class="lbl" font-size="11">LAYER 02</text>
  <text x="80" y="538" class="ttl" font-size="25">Hybrid</text>
  <text x="80" y="567" class="ttl" font-size="25">orchestration</text>
  <text x="80" y="596" class="ttl" font-size="25">&amp; runtime</text>
  <text x="80" y="621" class="sub" font-size="10.5">AGENT LAYER</text>
  <text x="80" y="653" class="bd" font-size="12.5">Dual-model strategy that balances</text>
  <text x="80" y="671" class="bd" font-size="12.5">speed against reasoning depth,</text>
  <text x="80" y="689" class="bd" font-size="12.5">conversation by conversation.</text>

  <!-- intent recognition -->
  <rect x="360" y="490" width="230" height="96" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
  <text x="475" y="520" text-anchor="middle" class="lbl" font-size="10">INTENT RECOGNITION</text>
  <text x="475" y="546" text-anchor="middle" class="ttl" font-size="16">Lightweight LLM</text>
  <text x="475" y="568" text-anchor="middle" class="bd" font-size="11">classifies user intent</text>
  <!-- branches -->
  <path d="M590 528 H610 V511 H630" fill="none" stroke="#bdbdb8" marker-end="url(#arw)"/>
  <path d="M590 548 H610 V565 H630" fill="none" stroke="#bdbdb8" marker-end="url(#arw)"/>
  <rect x="630" y="490" width="570" height="42" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
  <text x="650" y="516" class="sub" font-size="11"><tspan class="num">FAST TRACK</tspan><tspan fill="#6b6b6b">  —  immediate response via optimized templates</tspan></text>
  <rect x="630" y="544" width="570" height="42" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
  <text x="650" y="570" class="sub" font-size="11"><tspan class="num">DYNAMIC PLANNING</tspan><tspan fill="#6b6b6b">  —  orchestrates skills, tools &amp; MCP servers</tspan></text>

  <!-- agnostic runtime -->
  <rect x="360" y="610" width="840" height="74" rx="10" fill="#0a0a0a"/>
  <text x="384" y="642" class="ttl" font-size="18" style="fill:#ffffff">Agnostic runtime</text>
  <text x="384" y="667" class="bd" font-size="12" style="fill:#e9e9e4">Universal, business-neutral engine — becomes a domain expert on the fly, loading skill sets per context.</text>
  <text x="1176" y="638" text-anchor="end" class="sub" font-size="10" style="fill:#b8b8b3">UNIVERSAL · MINI</text>

  <!-- four sub services -->
  <g>
    <rect x="360" y="705" width="195" height="120" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
    <text x="382" y="744" class="num" font-size="13">2.1</text>
    <text x="382" y="780" class="ttl" font-size="15">Dynamic skill</text>
    <text x="382" y="799" class="ttl" font-size="15">repository</text>

    <rect x="575" y="705" width="195" height="120" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
    <text x="597" y="744" class="num" font-size="13">2.2</text>
    <text x="597" y="780" class="ttl" font-size="15">Intelligent</text>
    <text x="597" y="799" class="ttl" font-size="15">memory</text>

    <rect x="790" y="705" width="195" height="120" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
    <text x="812" y="744" class="num" font-size="13">2.3</text>
    <text x="812" y="780" class="ttl" font-size="15">Tool cache</text>

    <rect x="1005" y="705" width="195" height="120" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
    <text x="1027" y="744" class="num" font-size="13">2.4</text>
    <text x="1027" y="780" class="ttl" font-size="15">Business</text>
    <text x="1027" y="799" class="ttl" font-size="15">adapters</text>
  </g>

  <line x1="640" y1="855" x2="640" y2="881" stroke="#ff4500" stroke-width="1.5" marker-end="url(#arwA)"/>

  <!-- ════════ LAYER 03 ════════ -->
  <rect x="48" y="885" width="1184" height="310" rx="20" fill="#ffffff" stroke="#e4e4df"/>
  <rect x="80" y="915" width="28" height="3" fill="#ff4500"/>
  <text x="80" y="945" class="lbl" font-size="11">LAYER 03</text>
  <text x="80" y="983" class="ttl" font-size="25">Smart MCP</text>
  <text x="80" y="1012" class="ttl" font-size="25">routing</text>
  <text x="80" y="1037" class="sub" font-size="10.5">PROTOCOL LAYER</text>
  <text x="80" y="1069" class="bd" font-size="12.5">A service mesh with a unified</text>
  <text x="80" y="1087" class="bd" font-size="12.5">interface to heterogeneous</text>
  <text x="80" y="1105" class="bd" font-size="12.5">backends.</text>

  <rect x="360" y="935" width="250" height="96" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
  <text x="382" y="965" class="lbl" font-size="10">INTELLIGENT RESOLUTION</text>
  <text x="382" y="988" class="bd" font-size="11.5">Reconciles protocol</text>
  <text x="382" y="1005" class="bd" font-size="11.5">differences across ignite</text>
  <text x="382" y="1022" class="bd" font-size="11.5">&amp; white-label surfaces.</text>

  <line x1="610" y1="983" x2="650" y2="983" stroke="#bdbdb8" marker-end="url(#arw)"/>
  <rect x="655" y="935" width="250" height="96" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
  <text x="677" y="965" class="lbl" font-size="10">UNIFIED MCP INTERFACE</text>
  <text x="677" y="988" class="bd" font-size="11.5">Standardizes requests</text>
  <text x="677" y="1005" class="bd" font-size="11.5">&amp; responses across</text>
  <text x="677" y="1022" class="bd" font-size="11.5">heterogeneous backends.</text>

  <line x1="905" y1="983" x2="945" y2="983" stroke="#bdbdb8" marker-end="url(#arw)"/>
  <rect x="950" y="935" width="250" height="96" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
  <text x="972" y="965" class="lbl" font-size="10">INTELLIGENT ROUTING</text>
  <text x="972" y="988" class="bd" font-size="11.5">Selects the optimal</text>
  <text x="972" y="1005" class="bd" font-size="11.5">server by load,</text>
  <text x="972" y="1022" class="bd" font-size="11.5">capability &amp; policy.</text>

  <text x="360" y="1081" class="sub" font-size="10.5" fill="#a1a1a1">ROUTING INTELLIGENCE</text>
  <text x="360" y="1113" class="sub" font-size="11.5">LOAD BALANCING&#160;&#160;·&#160;&#160;HEALTH CHECK&#160;&#160;·&#160;&#160;CAPABILITY MATCH&#160;&#160;·&#160;&#160;COST OPTIMIZATION&#160;&#160;·&#160;&#160;POLICY &amp; SECURITY</text>

  <line x1="640" y1="1195" x2="640" y2="1221" stroke="#ff4500" stroke-width="1.5" marker-end="url(#arwA)"/>

  <!-- ════════ LAYER 04 ════════ -->
  <rect x="48" y="1225" width="1184" height="350" rx="20" fill="#ffffff" stroke="#e4e4df"/>
  <rect x="80" y="1255" width="28" height="3" fill="#ff4500"/>
  <text x="80" y="1285" class="lbl" font-size="11">LAYER 04</text>
  <text x="80" y="1323" class="ttl" font-size="25">MCP servers</text>
  <text x="80" y="1348" class="sub" font-size="10.5">CAPABILITY LAYER</text>
  <text x="80" y="1380" class="bd" font-size="12.5">Plug-and-play business</text>
  <text x="80" y="1398" class="bd" font-size="12.5">capabilities composed</text>
  <text x="80" y="1416" class="bd" font-size="12.5">per conversation.</text>

  <!-- six servers -->
  <g class="srv">
    <rect x="360" y="1275" width="130" height="120" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
    <text x="425" y="1342" text-anchor="middle" class="ttl" font-size="15">CRM</text>
    <rect x="502" y="1275" width="130" height="120" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
    <text x="567" y="1342" text-anchor="middle" class="ttl" font-size="15">Insurance</text>
    <rect x="644" y="1275" width="130" height="120" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
    <text x="709" y="1342" text-anchor="middle" class="ttl" font-size="15">Payment</text>
    <rect x="786" y="1275" width="130" height="120" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
    <text x="851" y="1342" text-anchor="middle" class="ttl" font-size="15">Knowledge</text>
    <rect x="928" y="1275" width="130" height="120" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
    <text x="993" y="1342" text-anchor="middle" class="ttl" font-size="15">Analytics</text>
    <rect x="1070" y="1275" width="130" height="120" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
    <text x="1135" y="1335" text-anchor="middle" class="ttl" font-size="15">3rd-party</text>
    <text x="1135" y="1354" text-anchor="middle" class="ttl" font-size="15">APIs</text>
  </g>
  <!-- dashed to foundation -->
  <line x1="425" y1="1395" x2="425" y2="1435" stroke="#cfcfca" stroke-dasharray="3 3"/>
  <line x1="567" y1="1395" x2="567" y2="1435" stroke="#cfcfca" stroke-dasharray="3 3"/>
  <line x1="709" y1="1395" x2="709" y2="1435" stroke="#cfcfca" stroke-dasharray="3 3"/>
  <line x1="851" y1="1395" x2="851" y2="1435" stroke="#cfcfca" stroke-dasharray="3 3"/>
  <line x1="993" y1="1395" x2="993" y2="1435" stroke="#cfcfca" stroke-dasharray="3 3"/>
  <line x1="1135" y1="1395" x2="1135" y2="1435" stroke="#cfcfca" stroke-dasharray="3 3"/>

  <rect x="360" y="1435" width="840" height="64" rx="10" fill="#fafaf7" stroke="#d4d4d4"/>
  <text x="384" y="1463" class="lbl" font-size="10.5">FOUNDATION</text>
  <text x="384" y="1487" class="bd" font-size="12">Databases&#160;&#160;·&#160;&#160;Data warehouses&#160;&#160;·&#160;&#160;Enterprise systems (ERP / OMS)&#160;&#160;·&#160;&#160;External APIs &amp; web services&#160;&#160;·&#160;&#160;Proprietary tools</text>
</svg>
