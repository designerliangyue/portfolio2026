<svg viewBox="0 0 1280 1760" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <style>
      .ttl{font-family:Georgia,'Times New Roman',serif;font-weight:400;fill:#0a0a0a;}
      .lbl{font-family:'SF Mono',Menlo,ui-monospace,monospace;letter-spacing:0.16em;fill:#a1a1a1;}
      .sub{font-family:'SF Mono',Menlo,ui-monospace,monospace;letter-spacing:0.14em;fill:#6b6b6b;}
      .bd{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;fill:#6b6b6b;}
      .num{font-family:'SF Mono',Menlo,ui-monospace,monospace;letter-spacing:0.08em;fill:#ff4500;}
    </style>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#bdbdb8" stroke-width="1.1"/>
    </marker>
    <marker id="arwA" markerWidth="10" markerHeight="10" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L6.5,3 L0,6" fill="none" stroke="#ff4500" stroke-width="1.4"/>
    </marker>
  </defs>

  <rect width="1280" height="1760" fill="#fafaf7"/>

  <!-- ── Header ── -->
  <text x="48" y="74" class="ttl" font-size="30">System architecture</text>
  <text x="48" y="102" class="sub" font-size="11">REQUEST FLOWS DOWN&#160;&#160;·&#160;&#160;CAPABILITIES RESOLVE UP</text>
  <text x="1232" y="70" text-anchor="end" class="lbl" font-size="11">AI SALES CO-PILOT</text>
  <text x="1232" y="94" text-anchor="end" class="lbl" font-size="11">MCP · MULTI-MODEL</text>

  <!-- ════════ LAYER 01 ════════ -->
  <rect x="48" y="140" width="1184" height="270" rx="20" fill="#ffffff" stroke="#e4e4df"/>
  <rect x="80" y="170" width="28" height="3" fill="#ff4500"/>
  <text x="80" y="200" class="lbl" font-size="11">LAYER 01</text>
  <text x="80" y="238" class="ttl" font-size="25">Omni-channel</text>
  <text x="80" y="267" class="ttl" font-size="25">integration</text>
  <text x="80" y="292" class="sub" font-size="10.5">BUSINESS LAYER</text>
  <text x="80" y="324" class="bd" font-size="12.5">Unified gateway for global IM</text>
  <text x="80" y="342" class="bd" font-size="12.5">platforms — abstracts each channel</text>
  <text x="80" y="360" class="bd" font-size="12.5">into one standard schema.</text>

  <text x="360" y="196" class="lbl" font-size="10.5">UNIFIED GATEWAY · GLOBAL IM PLATFORMS</text>
  <!-- channel chips -->
  <rect x="360" y="212" width="195" height="58" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
  <text x="457" y="247" text-anchor="middle" class="ttl" font-size="17">WhatsApp</text>
  <rect x="575" y="212" width="195" height="58" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
  <text x="672" y="247" text-anchor="middle" class="ttl" font-size="17">Line</text>
  <rect x="790" y="212" width="195" height="58" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
  <text x="887" y="247" text-anchor="middle" class="ttl" font-size="17">Zalo</text>
  <rect x="1005" y="212" width="195" height="58" rx="10" fill="#fafaf7" stroke="#e4e4df" stroke-dasharray="3 3"/>
  <text x="1102" y="244" text-anchor="middle" class="sub" font-size="10.5">FUTURE</text>
  <text x="1102" y="259" text-anchor="middle" class="sub" font-size="10.5">CHANNELS</text>
  <!-- chip → strip arrows -->
  <line x1="457" y1="270" x2="457" y2="300" stroke="#bdbdb8" marker-end="url(#arw)"/>
  <line x1="672" y1="270" x2="672" y2="300" stroke="#bdbdb8" marker-end="url(#arw)"/>
  <line x1="887" y1="270" x2="887" y2="300" stroke="#bdbdb8" marker-end="url(#arw)"/>
  <!-- standardized schema strip -->
  <rect x="360" y="304" width="840" height="48" rx="10" fill="#0a0a0a"/>
  <text x="780" y="333" text-anchor="middle" class="sub" font-size="12" fill="#fafaf7" letter-spacing="0.18em">STANDARDIZED DATA SCHEMA &amp; UNIFIED API</text>

  <!-- inter-layer connector -->
  <line x1="640" y1="410" x2="640" y2="436" stroke="#ff4500" stroke-width="1.5" marker-end="url(#arwA)"/>

  <!-- ════════ LAYER 02 ════════ -->
  <rect x="48" y="440" width="1184" height="560" rx="20" fill="#ffffff" stroke="#e4e4df"/>
  <rect x="80" y="470" width="28" height="3" fill="#ff4500"/>
  <text x="80" y="500" class="lbl" font-size="11">LAYER 02</text>
  <text x="80" y="538" class="ttl" font-size="25">Hybrid</text>
  <text x="80" y="567" class="ttl" font-size="25">orchestration</text>
  <text x="80" y="596" class="ttl" font-size="25">&amp; runtime</text>
  <text x="80" y="621" class="sub" font-size="10.5">AGENT LAYER</text>
  <text x="80" y="653" class="bd" font-size="12.5">Dual-model strategy that balances</text>
  <text x="80" y="671" class="bd" font-size="12.5">speed against reasoning depth,</text>
  <text x="80" y="689" class="bd" font-size="12.5">conversation by conversation.</text>

  <!-- intent recognition -->
  <rect x="360" y="490" width="230" height="96" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
  <text x="475" y="520" text-anchor="middle" class="lbl" font-size="10">INTENT RECOGNITION</text>
  <text x="475" y="546" text-anchor="middle" class="ttl" font-size="16">Lightweight LLM</text>
  <text x="475" y="568" text-anchor="middle" class="bd" font-size="11">classifies user intent</text>
  <!-- branches -->
  <path d="M590 528 H610 V511 H630" fill="none" stroke="#bdbdb8" marker-end="url(#arw)"/>
  <path d="M590 548 H610 V565 H630" fill="none" stroke="#bdbdb8" marker-end="url(#arw)"/>
  <rect x="630" y="490" width="570" height="42" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
  <text x="650" y="516" class="sub" font-size="11"><tspan class="num">FAST TRACK</tspan><tspan fill="#6b6b6b">  —  immediate response via optimized templates</tspan></text>
  <rect x="630" y="544" width="570" height="42" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
  <text x="650" y="570" class="sub" font-size="11"><tspan class="num">DYNAMIC PLANNING</tspan><tspan fill="#6b6b6b">  —  orchestrates skills, tools &amp; MCP servers</tspan></text>

  <!-- agnostic runtime -->
  <rect x="360" y="610" width="840" height="74" rx="10" fill="#0a0a0a"/>
  <text x="384" y="642" class="ttl" font-size="18" fill="#fafaf7">Agnostic runtime</text>
  <text x="384" y="667" class="bd" font-size="12" fill="#e9e9e4">Universal, business-neutral engine — becomes a domain expert on the fly, loading skill sets per context.</text>
  <text x="1176" y="638" text-anchor="end" class="sub" font-size="10" fill="#b8b8b3">UNIVERSAL · MINI</text>

  <!-- four sub services -->
  <g>
    <rect x="360" y="705" width="195" height="255" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
    <text x="382" y="742" class="num" font-size="13">2.1</text>
    <text x="382" y="775" class="ttl" font-size="15">Dynamic skill</text>
    <text x="382" y="794" class="ttl" font-size="15">repository</text>
    <text x="382" y="828" class="bd" font-size="11.5">Operators update</text>
    <text x="382" y="845" class="bd" font-size="11.5">business logic in</text>
    <text x="382" y="862" class="bd" font-size="11.5">real time — no</text>
    <text x="382" y="879" class="bd" font-size="11.5">redeploy.</text>

    <rect x="575" y="705" width="195" height="255" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
    <text x="597" y="742" class="num" font-size="13">2.2</text>
    <text x="597" y="775" class="ttl" font-size="15">Intelligent</text>
    <text x="597" y="794" class="ttl" font-size="15">memory</text>
    <text x="597" y="828" class="bd" font-size="11.5">Short-term,</text>
    <text x="597" y="845" class="bd" font-size="11.5">long-term &amp;</text>
    <text x="597" y="862" class="bd" font-size="11.5">user-persona</text>
    <text x="597" y="879" class="bd" font-size="11.5">context.</text>

    <rect x="790" y="705" width="195" height="255" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
    <text x="812" y="742" class="num" font-size="13">2.3</text>
    <text x="812" y="775" class="ttl" font-size="15">Tool cache</text>
    <text x="812" y="828" class="bd" font-size="11.5">Frequent outputs</text>
    <text x="812" y="845" class="bd" font-size="11.5">cached — lower</text>
    <text x="812" y="862" class="bd" font-size="11.5">latency &amp; token</text>
    <text x="812" y="879" class="bd" font-size="11.5">cost.</text>

    <rect x="1005" y="705" width="195" height="255" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
    <text x="1027" y="742" class="num" font-size="13">2.4</text>
    <text x="1027" y="775" class="ttl" font-size="15">Business</text>
    <text x="1027" y="794" class="ttl" font-size="15">adapters</text>
    <text x="1027" y="828" class="bd" font-size="11.5">Code-defined</text>
    <text x="1027" y="845" class="bd" font-size="11.5">insurance flows</text>
    <text x="1027" y="862" class="bd" font-size="11.5">for accuracy over</text>
    <text x="1027" y="879" class="bd" font-size="11.5">inference.</text>
  </g>

  <line x1="640" y1="1000" x2="640" y2="1026" stroke="#ff4500" stroke-width="1.5" marker-end="url(#arwA)"/>

  <!-- ════════ LAYER 03 ════════ -->
  <rect x="48" y="1030" width="1184" height="310" rx="20" fill="#ffffff" stroke="#e4e4df"/>
  <rect x="80" y="1060" width="28" height="3" fill="#ff4500"/>
  <text x="80" y="1090" class="lbl" font-size="11">LAYER 03</text>
  <text x="80" y="1128" class="ttl" font-size="25">Smart MCP</text>
  <text x="80" y="1157" class="ttl" font-size="25">routing</text>
  <text x="80" y="1182" class="sub" font-size="10.5">PROTOCOL LAYER</text>
  <text x="80" y="1214" class="bd" font-size="12.5">A service mesh with a unified</text>
  <text x="80" y="1232" class="bd" font-size="12.5">interface to heterogeneous</text>
  <text x="80" y="1250" class="bd" font-size="12.5">backends.</text>

  <rect x="360" y="1080" width="250" height="96" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
  <text x="382" y="1110" class="lbl" font-size="10">INTELLIGENT RESOLUTION</text>
  <text x="382" y="1133" class="bd" font-size="11.5">Reconciles protocol</text>
  <text x="382" y="1150" class="bd" font-size="11.5">differences across ignite</text>
  <text x="382" y="1167" class="bd" font-size="11.5">&amp; white-label surfaces.</text>

  <line x1="610" y1="1128" x2="650" y2="1128" stroke="#bdbdb8" marker-end="url(#arw)"/>
  <rect x="655" y="1080" width="250" height="96" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
  <text x="677" y="1110" class="lbl" font-size="10">UNIFIED MCP INTERFACE</text>
  <text x="677" y="1133" class="bd" font-size="11.5">Standardizes requests</text>
  <text x="677" y="1150" class="bd" font-size="11.5">&amp; responses across</text>
  <text x="677" y="1167" class="bd" font-size="11.5">heterogeneous backends.</text>

  <line x1="905" y1="1128" x2="945" y2="1128" stroke="#bdbdb8" marker-end="url(#arw)"/>
  <rect x="950" y="1080" width="250" height="96" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
  <text x="972" y="1110" class="lbl" font-size="10">INTELLIGENT ROUTING</text>
  <text x="972" y="1133" class="bd" font-size="11.5">Selects the optimal</text>
  <text x="972" y="1150" class="bd" font-size="11.5">server by load,</text>
  <text x="972" y="1167" class="bd" font-size="11.5">capability &amp; policy.</text>

  <text x="360" y="1226" class="sub" font-size="10.5" fill="#a1a1a1">ROUTING INTELLIGENCE</text>
  <text x="360" y="1258" class="sub" font-size="11.5">LOAD BALANCING&#160;&#160;·&#160;&#160;HEALTH CHECK&#160;&#160;·&#160;&#160;CAPABILITY MATCH&#160;&#160;·&#160;&#160;COST OPTIMIZATION&#160;&#160;·&#160;&#160;POLICY &amp; SECURITY</text>

  <line x1="640" y1="1340" x2="640" y2="1366" stroke="#ff4500" stroke-width="1.5" marker-end="url(#arwA)"/>

  <!-- ════════ LAYER 04 ════════ -->
  <rect x="48" y="1370" width="1184" height="350" rx="20" fill="#ffffff" stroke="#e4e4df"/>
  <rect x="80" y="1400" width="28" height="3" fill="#ff4500"/>
  <text x="80" y="1430" class="lbl" font-size="11">LAYER 04</text>
  <text x="80" y="1468" class="ttl" font-size="25">MCP servers</text>
  <text x="80" y="1493" class="sub" font-size="10.5">CAPABILITY LAYER</text>
  <text x="80" y="1525" class="bd" font-size="12.5">Plug-and-play business</text>
  <text x="80" y="1543" class="bd" font-size="12.5">capabilities composed</text>
  <text x="80" y="1561" class="bd" font-size="12.5">per conversation.</text>

  <!-- six servers -->
  <g class="srv">
    <rect x="360" y="1420" width="130" height="120" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
    <text x="425" y="1470" text-anchor="middle" class="ttl" font-size="14">CRM</text>
    <text x="425" y="1505" text-anchor="middle" class="sub" font-size="8.5">APIS / FUNCTIONS</text>
    <rect x="502" y="1420" width="130" height="120" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
    <text x="567" y="1470" text-anchor="middle" class="ttl" font-size="14">Insurance</text>
    <text x="567" y="1505" text-anchor="middle" class="sub" font-size="8.5">APIS / FUNCTIONS</text>
    <rect x="644" y="1420" width="130" height="120" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
    <text x="709" y="1470" text-anchor="middle" class="ttl" font-size="14">Payment</text>
    <text x="709" y="1505" text-anchor="middle" class="sub" font-size="8.5">APIS / FUNCTIONS</text>
    <rect x="786" y="1420" width="130" height="120" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
    <text x="851" y="1470" text-anchor="middle" class="ttl" font-size="14">Knowledge</text>
    <text x="851" y="1505" text-anchor="middle" class="sub" font-size="8.5">APIS / FUNCTIONS</text>
    <rect x="928" y="1420" width="130" height="120" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
    <text x="993" y="1470" text-anchor="middle" class="ttl" font-size="14">Analytics</text>
    <text x="993" y="1505" text-anchor="middle" class="sub" font-size="8.5">APIS / FUNCTIONS</text>
    <rect x="1070" y="1420" width="130" height="120" rx="10" fill="#fafaf7" stroke="#e4e4df"/>
    <text x="1135" y="1464" text-anchor="middle" class="ttl" font-size="14">3rd-party</text>
    <text x="1135" y="1482" text-anchor="middle" class="ttl" font-size="14">APIs</text>
    <text x="1135" y="1510" text-anchor="middle" class="sub" font-size="8.5">APIS / FUNCTIONS</text>
  </g>
  <!-- dashed to foundation -->
  <line x1="425" y1="1540" x2="425" y2="1580" stroke="#cfcfca" stroke-dasharray="3 3"/>
  <line x1="709" y1="1540" x2="709" y2="1580" stroke="#cfcfca" stroke-dasharray="3 3"/>
  <line x1="993" y1="1540" x2="993" y2="1580" stroke="#cfcfca" stroke-dasharray="3 3"/>
  <line x1="1135" y1="1540" x2="1135" y2="1580" stroke="#cfcfca" stroke-dasharray="3 3"/>

  <rect x="360" y="1580" width="840" height="64" rx="10" fill="#fafaf7" stroke="#d4d4d4"/>
  <text x="384" y="1608" class="lbl" font-size="10.5">FOUNDATION</text>
  <text x="384" y="1632" class="bd" font-size="12">Databases&#160;&#160;·&#160;&#160;Data warehouses&#160;&#160;·&#160;&#160;Enterprise systems (ERP / OMS)&#160;&#160;·&#160;&#160;External APIs &amp; web services&#160;&#160;·&#160;&#160;Proprietary tools</text>
</svg>
