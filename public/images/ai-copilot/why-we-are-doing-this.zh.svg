<svg viewBox="0 0 1184 596" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'PingFang SC', 'Segoe UI', Roboto, sans-serif">
  <defs>
    <style>
      .ttl{font-family:'Songti SC','Noto Serif SC',Georgia,serif;font-weight:600;fill:#0a0a0a;}
      .hd{font-family:-apple-system,'PingFang SC','Segoe UI',Roboto,sans-serif;font-weight:600;fill:#0a0a0a;}
      .lbl{font-family:'SF Mono',Menlo,ui-monospace,monospace;letter-spacing:0.16em;fill:#a1a1a1;}
      .bd{font-family:-apple-system,'PingFang SC','Segoe UI',Roboto,sans-serif;fill:#5a5a58;}
      .mn{font-family:'SF Mono',Menlo,ui-monospace,'PingFang SC',monospace;fill:#8a8a86;}
    </style>
  </defs>

  <rect x="0.5" y="0.5" width="1183" height="595" rx="20" fill="#ffffff" stroke="#e4e4df"/>

  <rect x="64" y="46" width="28" height="3" fill="#ff4500"/>
  <text x="64" y="84" class="ttl" font-size="25">我们为什么要做这件事？</text>

  <!-- Section 1 -->
  <text x="64" y="126" class="hd" font-size="15">市场现实：聊天优先的经济</text>
  <text x="64" y="151" class="bd" font-size="13.5">在东南亚，WhatsApp 是商业沟通的主要平台。但现有保险科技的工作流充满摩擦：代理人在 WhatsApp 上获客，</text>
  <text x="64" y="172" class="bd" font-size="13.5">却必须切换到独立的移动应用生成报价。这种“上下文切换”拖慢了销售节奏。</text>

  <!-- Section 2 -->
  <text x="64" y="214" class="hd" font-size="15">机会点</text>
  <text x="64" y="239" class="bd" font-size="13.5">我们计划将 <tspan fill="#ff4500" font-weight="600">WhatsApp Flow</tspan> 与非结构化的对话式 AI（NLP / LLM）结合，把从报价到出单的完整旅程嵌入聊天之中——</text>
  <text x="64" y="260" class="bd" font-size="13.5">需要精确时使用结构化 UI，需要灵活时使用自由文本。</text>

  <line x1="64" y1="296" x2="1120" y2="296" stroke="#ececea"/>
  <text x="64" y="330" class="bd" font-size="14" fill="#3a3a3a">在 WhatsApp 内完成端到端销售是一种混合形态：既不是纯聊天机器人，也不只是纯表单。</text>

  <!-- Mode card 1 -->
  <rect x="64" y="356" width="516" height="200" rx="14" fill="#fafaf7" stroke="#e4e4df"/>
  <text x="92" y="392" class="ttl" font-size="16">模式一 · 非结构化（NLP / LLM）</text>
  <text x="92" y="420" class="lbl" font-size="10">主要交互</text>
  <text x="92" y="438" class="bd" font-size="13">自由文本的对话式 AI</text>
  <text x="92" y="464" class="lbl" font-size="10">适用场景</text>
  <text x="92" y="482" class="bd" font-size="13">咨询、话术生成、报价</text>
  <text x="92" y="508" class="lbl" font-size="10">示例</text>
  <text x="92" y="528" class="mn" font-size="12">“为一辆 2020 款丰田卡罗拉购买车险”</text>

  <!-- Mode card 2 -->
  <rect x="604" y="356" width="516" height="200" rx="14" fill="#fafaf7" stroke="#e4e4df"/>
  <text x="632" y="392" class="ttl" font-size="16">模式二 · 结构化（UI 组件）</text>
  <text x="632" y="420" class="lbl" font-size="10">主要交互</text>
  <text x="632" y="438" class="bd" font-size="13">原生 UI——WhatsApp Flows 与列表</text>
  <text x="632" y="464" class="lbl" font-size="10">适用场景</text>
  <text x="632" y="482" class="bd" font-size="13">数据录入、跟进、数据库查询</text>
  <text x="632" y="508" class="lbl" font-size="10">示例</text>
  <text x="632" y="528" class="mn" font-size="12">[选择方案] → 弹出列表</text>
</svg>
