<svg viewBox="0 0 1184 600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <style>
      .ttl{font-family:Georgia,'Times New Roman',serif;font-weight:400;fill:#0a0a0a;}
      .hd{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;font-weight:600;fill:#0a0a0a;}
      .lbl{font-family:'SF Mono',Menlo,ui-monospace,monospace;letter-spacing:0.16em;fill:#a1a1a1;}
      .bd{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;fill:#5a5a58;}
      .mn{font-family:'SF Mono',Menlo,ui-monospace,monospace;fill:#6b6b6b;}
    </style>
  </defs>

  <rect x="0.5" y="0.5" width="1183" height="599" rx="20" fill="#ffffff" stroke="#e4e4df"/>

  <rect x="64" y="46" width="28" height="3" fill="#ff4500"/>
  <text x="64" y="84" class="ttl" font-size="25">🤔  Why Are We Doing This?</text>

  <!-- Section 1 -->
  <text x="64" y="128" class="hd" font-size="15">The Market Reality: Chat-First Economy</text>
  <text x="64" y="153" class="bd" font-size="13.5">In Southeast Asia, WhatsApp is the dominant operating system for business. However, current Insurtech</text>
  <text x="64" y="174" class="bd" font-size="13.5">workflows create friction: agents acquire leads on WhatsApp but must switch to a separate mobile app to</text>
  <text x="64" y="195" class="bd" font-size="13.5">generate quotes. This “context switching” slows down sales velocity.</text>

  <!-- Section 2 -->
  <text x="64" y="237" class="hd" font-size="15">The Opportunity</text>
  <text x="64" y="262" class="bd" font-size="13.5">We aim to implement <tspan fill="#ff4500" font-weight="600">WhatsApp Flow</tspan> together with unstructured conversational AI (NLP / LLM) to embed the</text>
  <text x="64" y="283" class="bd" font-size="13.5">entire Quote-to-Issue journey in chat — structured UI where precision matters, free text where flexibility</text>
  <text x="64" y="304" class="bd" font-size="13.5">matters.</text>

  <line x1="64" y1="338" x2="1120" y2="338" stroke="#ececea"/>
  <text x="64" y="372" class="bd" font-size="14" fill="#3a3a3a">End-to-end sales in WhatsApp is a hybrid: neither pure chatbot nor pure forms alone.</text>

  <!-- Mode card 1 -->
  <rect x="64" y="398" width="516" height="170" rx="14" fill="#fafaf7" stroke="#e4e4df"/>
  <text x="92" y="432" class="ttl" font-size="16">Mode 1 · Unstructured (NLP / LLM)</text>
  <text x="92" y="460" class="lbl" font-size="10">PRIMARY INTERFACE</text>
  <text x="92" y="478" class="bd" font-size="13">Free-text conversational AI</text>
  <text x="92" y="504" class="lbl" font-size="10">BEST FOR</text>
  <text x="92" y="522" class="bd" font-size="13">Consulting, script generation, quoting</text>
  <text x="92" y="548" class="lbl" font-size="10">EXAMPLE</text>
  <text x="320" y="548" text-anchor="start" class="mn" font-size="11.5" fill="#8a8a86">“Buy car insurance for a 2020 Toyota Corolla”</text>

  <!-- Mode card 2 -->
  <rect x="604" y="398" width="516" height="170" rx="14" fill="#fafaf7" stroke="#e4e4df"/>
  <text x="632" y="432" class="ttl" font-size="16">Mode 2 · Structured (UI elements)</text>
  <text x="632" y="460" class="lbl" font-size="10">PRIMARY INTERFACE</text>
  <text x="632" y="478" class="bd" font-size="13">Native UI — WhatsApp Flows &amp; Lists</text>
  <text x="632" y="504" class="lbl" font-size="10">BEST FOR</text>
  <text x="632" y="522" class="bd" font-size="13">Data entry, follow-up, database lookups</text>
  <text x="632" y="548" class="lbl" font-size="10">EXAMPLE</text>
  <text x="860" y="548" text-anchor="start" class="mn" font-size="11.5" fill="#8a8a86">[Choose plan] → list popup</text>
</svg>
