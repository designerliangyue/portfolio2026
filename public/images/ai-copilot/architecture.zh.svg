<svg viewBox="48 120 1184 1485" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'PingFang SC', 'Segoe UI', Roboto, sans-serif">
  <defs>
    <style>
      .ttl{font-family:'Songti SC','Noto Serif SC',Georgia,serif;font-weight:600;fill:#292219;}
      .lbl{font-family:'SF Mono',Menlo,ui-monospace,'PingFang SC',monospace;letter-spacing:0.16em;fill:#a39781;}
      .sub{font-family:'SF Mono',Menlo,ui-monospace,'PingFang SC',monospace;letter-spacing:0.14em;fill:#6f6659;}
      .bd{font-family:-apple-system,'PingFang SC','Segoe UI',Roboto,sans-serif;fill:#6f6659;}
      .num{font-family:'SF Mono',Menlo,ui-monospace,monospace;letter-spacing:0.08em;fill:#b6552f;}
    </style>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#b3a88c" stroke-width="1.1"/>
    </marker>
    <marker id="arwA" markerWidth="10" markerHeight="10" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L6.5,3 L0,6" fill="none" stroke="#b6552f" stroke-width="1.4"/>
    </marker>
  </defs>

  <!-- ════════ LAYER 01 ════════ -->
  <rect x="48" y="140" width="1184" height="270" rx="20" fill="#fffdf8" stroke="#e5ddca"/>
  <rect x="80" y="170" width="28" height="3" fill="#b6552f"/>
  <text x="80" y="200" class="lbl" font-size="11">层级 01</text>
  <text x="80" y="238" class="ttl" font-size="25">全渠道接入</text>
  <text x="80" y="292" class="sub" font-size="10.5">业务层</text>
  <text x="80" y="324" class="bd" font-size="12.5">面向全球 IM 平台的统一网关——</text>
  <text x="80" y="342" class="bd" font-size="12.5">将各个渠道抽象为同一套</text>
  <text x="80" y="360" class="bd" font-size="12.5">标准数据结构。</text>

  <text x="360" y="196" class="lbl" font-size="10.5">统一网关 · 全球 IM 平台</text>
  <!-- channel chips -->
  <rect x="360" y="212" width="195" height="58" rx="10" fill="#f6f1e7" stroke="#e5ddca"/>
  <text x="457" y="247" text-anchor="middle" class="ttl" font-size="17">WhatsApp</text>
  <rect x="575" y="212" width="195" height="58" rx="10" fill="#f6f1e7" stroke="#e5ddca"/>
  <text x="672" y="247" text-anchor="middle" class="ttl" font-size="17">Line</text>
  <rect x="790" y="212" width="195" height="58" rx="10" fill="#f6f1e7" stroke="#e5ddca"/>
  <text x="887" y="247" text-anchor="middle" class="ttl" font-size="17">Zalo</text>
  <rect x="1005" y="212" width="195" height="58" rx="10" fill="#f6f1e7" stroke="#e5ddca" stroke-dasharray="3 3"/>
  <text x="1102" y="244" text-anchor="middle" class="sub" font-size="10.5">未来</text>
  <text x="1102" y="259" text-anchor="middle" class="sub" font-size="10.5">渠道</text>
  <!-- chip → strip arrows -->
  <line x1="457" y1="270" x2="457" y2="300" stroke="#b3a88c" marker-end="url(#arw)"/>
  <line x1="672" y1="270" x2="672" y2="300" stroke="#b3a88c" marker-end="url(#arw)"/>
  <line x1="887" y1="270" x2="887" y2="300" stroke="#b3a88c" marker-end="url(#arw)"/>
  <!-- standardized schema strip -->
  <rect x="360" y="304" width="840" height="48" rx="10" fill="#292219"/>
  <text x="780" y="333" text-anchor="middle" class="sub" font-size="12" style="fill:#f6f1e7" letter-spacing="0.18em">标准化数据结构与统一 API</text>

  <!-- inter-layer connector -->
  <line x1="640" y1="410" x2="640" y2="436" stroke="#b6552f" stroke-width="1.5" marker-end="url(#arwA)"/>

  <!-- ════════ LAYER 02 ════════ -->
  <rect x="48" y="440" width="1184" height="415" rx="20" fill="#fffdf8" stroke="#e5ddca"/>
  <rect x="80" y="470" width="28" height="3" fill="#b6552f"/>
  <text x="80" y="500" class="lbl" font-size="11">层级 02</text>
  <text x="80" y="538" class="ttl" font-size="25">混合编排</text>
  <text x="80" y="567" class="ttl" font-size="25">与运行时</text>
  <text x="80" y="621" class="sub" font-size="10.5">智能体层</text>
  <text x="80" y="653" class="bd" font-size="12.5">双模型策略，在每一次对话中</text>
  <text x="80" y="671" class="bd" font-size="12.5">平衡响应速度与推理深度。</text>

  <!-- intent recognition -->
  <rect x="360" y="490" width="230" height="96" rx="10" fill="#f6f1e7" stroke="#e5ddca"/>
  <text x="475" y="520" text-anchor="middle" class="lbl" font-size="10">意图识别</text>
  <text x="475" y="546" text-anchor="middle" class="ttl" font-size="16">轻量级 LLM</text>
  <text x="475" y="568" text-anchor="middle" class="bd" font-size="11">识别并分类用户意图</text>
  <!-- branches -->
  <path d="M590 528 H610 V511 H630" fill="none" stroke="#b3a88c" marker-end="url(#arw)"/>
  <path d="M590 548 H610 V565 H630" fill="none" stroke="#b3a88c" marker-end="url(#arw)"/>
  <rect x="630" y="490" width="570" height="42" rx="10" fill="#f6f1e7" stroke="#e5ddca"/>
  <text x="650" y="516" class="sub" font-size="11"><tspan class="num">快速通道</tspan><tspan fill="#6f6659">  —  通过优化模板即时响应</tspan></text>
  <rect x="630" y="544" width="570" height="42" rx="10" fill="#f6f1e7" stroke="#e5ddca"/>
  <text x="650" y="570" class="sub" font-size="11"><tspan class="num">动态规划</tspan><tspan fill="#6f6659">  —  编排技能、工具与 MCP 服务</tspan></text>

  <!-- agnostic runtime -->
  <rect x="360" y="610" width="840" height="74" rx="10" fill="#292219"/>
  <text x="384" y="642" class="ttl" font-size="18" style="fill:#fffdf8">通用运行时</text>
  <text x="384" y="667" class="bd" font-size="12" style="fill:#efe8d8">业务无关的通用引擎——按上下文加载技能集，即时成为领域专家。</text>
  <text x="1176" y="638" text-anchor="end" class="sub" font-size="10" style="fill:#b0a68f">UNIVERSAL · MINI</text>

  <!-- four sub services -->
  <g>
    <rect x="360" y="705" width="195" height="120" rx="10" fill="#f6f1e7" stroke="#e5ddca"/>
    <text x="382" y="744" class="num" font-size="13">2.1</text>
    <text x="382" y="780" class="ttl" font-size="15">动态技能库</text>

    <rect x="575" y="705" width="195" height="120" rx="10" fill="#f6f1e7" stroke="#e5ddca"/>
    <text x="597" y="744" class="num" font-size="13">2.2</text>
    <text x="597" y="780" class="ttl" font-size="15">智能记忆</text>

    <rect x="790" y="705" width="195" height="120" rx="10" fill="#f6f1e7" stroke="#e5ddca"/>
    <text x="812" y="744" class="num" font-size="13">2.3</text>
    <text x="812" y="780" class="ttl" font-size="15">工具缓存</text>

    <rect x="1005" y="705" width="195" height="120" rx="10" fill="#f6f1e7" stroke="#e5ddca"/>
    <text x="1027" y="744" class="num" font-size="13">2.4</text>
    <text x="1027" y="780" class="ttl" font-size="15">业务适配器</text>
  </g>

  <line x1="640" y1="855" x2="640" y2="881" stroke="#b6552f" stroke-width="1.5" marker-end="url(#arwA)"/>

  <!-- ════════ LAYER 03 ════════ -->
  <rect x="48" y="885" width="1184" height="310" rx="20" fill="#fffdf8" stroke="#e5ddca"/>
  <rect x="80" y="915" width="28" height="3" fill="#b6552f"/>
  <text x="80" y="945" class="lbl" font-size="11">层级 03</text>
  <text x="80" y="983" class="ttl" font-size="25">智能 MCP</text>
  <text x="80" y="1012" class="ttl" font-size="25">路由</text>
  <text x="80" y="1037" class="sub" font-size="10.5">协议层</text>
  <text x="80" y="1069" class="bd" font-size="12.5">以统一接口连接</text>
  <text x="80" y="1087" class="bd" font-size="12.5">异构后端的服务网格。</text>

  <rect x="360" y="935" width="250" height="96" rx="10" fill="#f6f1e7" stroke="#e5ddca"/>
  <text x="382" y="965" class="lbl" font-size="10">智能解析</text>
  <text x="382" y="988" class="bd" font-size="11.5">调和 Ignite 与白标产品</text>
  <text x="382" y="1005" class="bd" font-size="11.5">之间的协议差异。</text>

  <line x1="610" y1="983" x2="650" y2="983" stroke="#b3a88c" marker-end="url(#arw)"/>
  <rect x="655" y="935" width="250" height="96" rx="10" fill="#f6f1e7" stroke="#e5ddca"/>
  <text x="677" y="965" class="lbl" font-size="10">统一 MCP 接口</text>
  <text x="677" y="988" class="bd" font-size="11.5">跨异构后端标准化</text>
  <text x="677" y="1005" class="bd" font-size="11.5">请求与响应。</text>

  <line x1="905" y1="983" x2="945" y2="983" stroke="#b3a88c" marker-end="url(#arw)"/>
  <rect x="950" y="935" width="250" height="96" rx="10" fill="#f6f1e7" stroke="#e5ddca"/>
  <text x="972" y="965" class="lbl" font-size="10">智能路由</text>
  <text x="972" y="988" class="bd" font-size="11.5">按负载、能力与策略</text>
  <text x="972" y="1005" class="bd" font-size="11.5">选择最优服务。</text>

  <text x="360" y="1081" class="sub" font-size="10.5" fill="#a39781">路由智能</text>
  <text x="360" y="1113" class="sub" font-size="11.5">负载均衡&#160;&#160;·&#160;&#160;健康检查&#160;&#160;·&#160;&#160;能力匹配&#160;&#160;·&#160;&#160;成本优化&#160;&#160;·&#160;&#160;策略与安全</text>

  <line x1="640" y1="1195" x2="640" y2="1221" stroke="#b6552f" stroke-width="1.5" marker-end="url(#arwA)"/>

  <!-- ════════ LAYER 04 ════════ -->
  <rect x="48" y="1225" width="1184" height="350" rx="20" fill="#fffdf8" stroke="#e5ddca"/>
  <rect x="80" y="1255" width="28" height="3" fill="#b6552f"/>
  <text x="80" y="1285" class="lbl" font-size="11">层级 04</text>
  <text x="80" y="1323" class="ttl" font-size="25">MCP 服务</text>
  <text x="80" y="1348" class="sub" font-size="10.5">能力层</text>
  <text x="80" y="1380" class="bd" font-size="12.5">即插即用的业务能力，</text>
  <text x="80" y="1398" class="bd" font-size="12.5">按对话灵活组合。</text>

  <!-- six servers -->
  <g class="srv">
    <rect x="360" y="1275" width="130" height="120" rx="10" fill="#f6f1e7" stroke="#e5ddca"/>
    <text x="425" y="1342" text-anchor="middle" class="ttl" font-size="15">CRM</text>
    <rect x="502" y="1275" width="130" height="120" rx="10" fill="#f6f1e7" stroke="#e5ddca"/>
    <text x="567" y="1342" text-anchor="middle" class="ttl" font-size="15">保险</text>
    <rect x="644" y="1275" width="130" height="120" rx="10" fill="#f6f1e7" stroke="#e5ddca"/>
    <text x="709" y="1342" text-anchor="middle" class="ttl" font-size="15">支付</text>
    <rect x="786" y="1275" width="130" height="120" rx="10" fill="#f6f1e7" stroke="#e5ddca"/>
    <text x="851" y="1342" text-anchor="middle" class="ttl" font-size="15">知识库</text>
    <rect x="928" y="1275" width="130" height="120" rx="10" fill="#f6f1e7" stroke="#e5ddca"/>
    <text x="993" y="1342" text-anchor="middle" class="ttl" font-size="15">数据分析</text>
    <rect x="1070" y="1275" width="130" height="120" rx="10" fill="#f6f1e7" stroke="#e5ddca"/>
    <text x="1135" y="1335" text-anchor="middle" class="ttl" font-size="15">第三方</text>
    <text x="1135" y="1354" text-anchor="middle" class="ttl" font-size="15">API</text>
  </g>
  <!-- dashed to foundation -->
  <line x1="425" y1="1395" x2="425" y2="1435" stroke="#cfc5ac" stroke-dasharray="3 3"/>
  <line x1="567" y1="1395" x2="567" y2="1435" stroke="#cfc5ac" stroke-dasharray="3 3"/>
  <line x1="709" y1="1395" x2="709" y2="1435" stroke="#cfc5ac" stroke-dasharray="3 3"/>
  <line x1="851" y1="1395" x2="851" y2="1435" stroke="#cfc5ac" stroke-dasharray="3 3"/>
  <line x1="993" y1="1395" x2="993" y2="1435" stroke="#cfc5ac" stroke-dasharray="3 3"/>
  <line x1="1135" y1="1395" x2="1135" y2="1435" stroke="#cfc5ac" stroke-dasharray="3 3"/>

  <rect x="360" y="1435" width="840" height="64" rx="10" fill="#f6f1e7" stroke="#ddd4bf"/>
  <text x="384" y="1463" class="lbl" font-size="10.5">基础设施</text>
  <text x="384" y="1487" class="bd" font-size="12">数据库&#160;&#160;·&#160;&#160;数据仓库&#160;&#160;·&#160;&#160;企业系统（ERP / OMS）&#160;&#160;·&#160;&#160;外部 API 与网络服务&#160;&#160;·&#160;&#160;自研工具</text>
</svg>
